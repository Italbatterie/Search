<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Italbatterie – Appuntamenti</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --teal:#00475d;--teal-light:#005f7a;--teal-dark:#003040;
  --accent:#f0a500;--accent2:#00b8d9;
  --bg:#eef4f6;--surface:#fff;--surface2:#f4f9fb;
  --text:#1a2e38;--muted:#7a9aaa;--border:#d0e4eb;
  --red:#e05050;--green:#2eb87b;--orange:#f0a500;
  --radius:14px;--shadow:0 4px 24px rgba(0,71,93,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

header{background:var(--teal);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.2)}
.header-inner{max-width:1400px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo-wrap{display:flex;flex-direction:column;line-height:1}
.logo-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;letter-spacing:4px;text-transform:uppercase}
.logo-sub{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:3px;text-transform:uppercase;margin-top:3px}
.header-center{flex:1;text-align:center}
.header-date-text{font-size:13px;color:rgba(255,255,255,.65);font-weight:500}
.header-actions{margin-left:auto;display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-white{background:#fff;color:var(--teal)}.btn-white:hover{background:#e8f4f8}
.btn-outline{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.3)}.btn-outline:hover{background:rgba(255,255,255,.1)}
#refresh-btn.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.container{max-width:1400px;margin:0 auto;padding:28px 24px}

/* HERO */
.today-hero{background:linear-gradient(135deg,var(--teal) 0%,var(--teal-light) 60%,#007a9a 100%);border-radius:var(--radius);padding:26px 30px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;position:relative;overflow:hidden}
.today-hero::before{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;background:rgba(255,255,255,.04);border-radius:50%}
.today-hero::after{content:'';position:absolute;right:40px;bottom:-60px;width:150px;height:150px;background:rgba(255,255,255,.03);border-radius:50%}
.hero-left{position:relative;z-index:1}
.hero-label{font-size:9px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:3px;margin-bottom:6px}
.hero-date{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#fff;line-height:1.1;margin-bottom:5px}
.hero-sub{font-size:13px;color:rgba(255,255,255,.6)}
.hero-right{display:flex;gap:14px;position:relative;z-index:1;flex-wrap:wrap}
.hero-stat{background:rgba(255,255,255,.12);border-radius:12px;padding:14px 20px;text-align:center;backdrop-filter:blur(4px)}
.hero-stat-num{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:#fff;line-height:1}
.hero-stat-label{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px}

/* SECTION */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.section-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--teal);flex-shrink:0}
.dot.muted{background:var(--muted)}
.section-badge{background:var(--teal);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.section-divider{height:1.5px;background:var(--border);margin:28px 0;border-radius:2px}

/* TOOLBAR */
.toolbar{background:var(--surface);border-radius:var(--radius);padding:14px 18px;margin-bottom:18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
#search-input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;background:var(--surface2)}
#search-input:focus{border-color:var(--teal)}
.filter-group{display:flex;gap:8px;flex-wrap:wrap}
select.filter-select{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--surface2);color:var(--text);cursor:pointer;outline:none}
select.filter-select:focus{border-color:var(--teal)}
.view-toggle{display:flex;background:var(--surface2);border-radius:8px;padding:3px;border:1.5px solid var(--border)}
.view-btn{padding:6px 12px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:5px;transition:all .2s;font-family:'DM Sans',sans-serif}
.view-btn.active{background:var(--teal);color:#fff}
.record-count{font-size:12px;color:var(--muted);white-space:nowrap}

/* CALENDAR */
.calendar-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:24px}
.cal-header{background:var(--teal);padding:18px 24px;display:flex;align-items:center;gap:12px}
.cal-header h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;flex:1;text-align:center;text-transform:capitalize}
.cal-nav{background:transparent;border:1.5px solid rgba(255,255,255,.3);color:#fff;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.cal-nav:hover{background:rgba(255,255,255,.15)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day-header{padding:10px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;border-bottom:1.5px solid var(--border)}
.cal-cell{min-height:80px;padding:6px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:var(--surface2)}
.cal-cell.empty{background:var(--surface2);cursor:default}
.cal-cell.today{background:rgba(0,71,93,.05)}
.cal-cell.today .cal-date{background:var(--teal);color:#fff;border-radius:50%}
.cal-date{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin-bottom:4px;border-radius:50%}
.cal-dot{font-size:10px;padding:2px 5px;border-radius:4px;background:var(--teal);color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;display:block;max-width:100%}
.cal-dot.more{background:var(--accent)}

/* CARDS */
.list-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.appointment-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;transition:transform .2s,box-shadow .2s;cursor:pointer}
.appointment-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,71,93,.15)}
.appointment-card.today-card{box-shadow:0 4px 24px rgba(0,71,93,.18),0 0 0 2px rgba(0,71,93,.12)}
.card-accent{width:5px;flex-shrink:0}
.card-accent.green{background:var(--green)}.card-accent.orange{background:var(--orange)}.card-accent.blue{background:var(--accent2)}.card-accent.teal{background:var(--teal)}
.card-body{flex:1;padding:18px 20px;display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:center}
.card-field label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:3px}
.card-field .val{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.card-field .val.big{font-size:15px;color:var(--teal);font-weight:700}
.card-field .sub{font-size:11px;color:var(--muted);margin-top:1px}
.card-badge{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.badge-green{background:rgba(46,184,123,.12);color:#1a8a5a}.badge-orange{background:rgba(240,165,0,.12);color:#a06600}.badge-teal{background:rgba(0,71,93,.1);color:var(--teal)}.badge-blue{background:rgba(0,184,217,.12);color:#0077a0}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:18px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.3);transform:translateY(20px);transition:transform .25s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{background:var(--teal);padding:22px 28px;display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;margin-bottom:3px}
.modal-sub{font-size:12px;color:rgba(255,255,255,.6)}
.modal-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.modal-close:hover{background:rgba(255,255,255,.3)}
.modal-body{padding:24px 28px}
.modal-section{margin-bottom:20px}
.modal-section h4{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;padding-bottom:6px;border-bottom:1.5px solid var(--border)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-field label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:3px}
.modal-field .val{font-size:14px;color:var(--text);line-height:1.4}
.modal-field .val.highlight{font-weight:700;color:var(--teal);font-size:16px}
.modal-note{background:var(--surface2);border-radius:10px;padding:14px;font-size:13px;color:var(--text);line-height:1.6;border-left:3px solid var(--teal)}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state .icon{font-size:44px;margin-bottom:14px}
.empty-state h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-state p{font-size:13px}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(238,244,246,.92);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:44px;height:44px;border:4px solid rgba(0,71,93,.15);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
.loading-text{font-family:'Syne',sans-serif;font-size:14px;color:var(--teal);font-weight:600;letter-spacing:1px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--teal);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:400;transform:translateY(60px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:var(--red)}.toast.success{background:var(--green)}

@media(max-width:900px){.card-body{grid-template-columns:1fr 1fr;gap:10px}.card-field:last-child{grid-column:span 2}}
@media(max-width:640px){
  .container{padding:16px}.card-body{grid-template-columns:1fr;gap:8px}.card-field:last-child{grid-column:1}
  .modal-grid{grid-template-columns:1fr}.header-inner{padding:12px 16px}.logo-title{font-size:18px;letter-spacing:2px}
  .toolbar{flex-direction:column;align-items:stretch}.filter-group{flex-direction:column}.view-toggle{width:fit-content}
  .today-hero{flex-direction:column;align-items:flex-start}.hero-right{width:100%}.hero-stat{flex:1}.hero-date{font-size:20px}
}
@media(max-width:400px){.cal-dot{display:none}}
</style>
</head>

<script>
const SHEET_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRoKsL-JYKMcv6l_cvuH_VKYyPhcus_JdxaJS0PvRy1j8t_7z6g4YZBKzte40gRbXfQ37vvLBy2IPcu/pub?gid=60641573&single=true&output=csv';
const MONTHS_IT=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DAYS_FULL=['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];
const DAYS_SHORT=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const ACCENTS=['teal','green','orange','blue'];
const BADGES=['badge-teal','badge-green','badge-orange','badge-blue'];
let allData=[],filtered=[],currentView='list',calYear=new Date().getFullYear(),calMonth=new Date().getMonth();

window.onload=()=>{
  const now=new Date();
  const dayName=DAYS_FULL[now.getDay()].charAt(0).toUpperCase()+DAYS_FULL[now.getDay()].slice(1);
  const fullDate=`${dayName} ${now.getDate()} ${MONTHS_IT[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('header-date').textContent=fullDate;
  document.getElementById('hero-date-full').textContent=fullDate;
  loadData();
};

async function loadData(){
  setLoading(true);
  try{
    // Cache-busting: timestamp per forzare richiesta fresca ad ogni aggiornamento
    const bustUrl = SHEET_URL + '&_t=' + Date.now();
    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(bustUrl);
    const r = await fetch(proxyUrl, {
      cache: 'no-store',
      headers: {'Cache-Control': 'no-cache, no-store, must-revalidate', 'Pragma': 'no-cache'}
    });
    if(!r.ok) throw new Error('HTTP ' + r.status);
    const text = await r.text();
    if(!text || text.trim().length === 0) throw new Error('Foglio vuoto o non raggiungibile');
    allData = parseCSV(text);
    processData();
    const now = new Date();
    const timeStr = now.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    showToast('Aggiornato alle ' + timeStr + ' ✓', 'success');
  }catch(e){showToast('Errore nel caricamento: '+e.message,'error');console.error(e);}
  finally{setLoading(false);}
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2)return[];
  const headers=parseCSVLine(lines[0]).map(h=>h.trim().toLowerCase()
    .replace('n° veicoli','num_veicoli').replace('n veicoli','num_veicoli')
    .replace('tipo veicoli','tipo_veicoli').replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''));
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const vals=parseCSVLine(lines[i]);
    if(vals.every(v=>!v.trim()))continue;
    const obj={};
    headers.forEach((h,idx)=>obj[h]=(vals[idx]||'').trim());
    rows.push(obj);
  }
  return rows;
}
function parseCSVLine(line){
  const res=[]; let cur='',inQ=false;
  for(const c of line){
    if(c==='"'){inQ=!inQ;continue;}
    if(c===','&&!inQ){res.push(cur);cur='';continue;}
    cur+=c;
  }
  res.push(cur); return res;
}

function processData(){
  document.getElementById('main-container').style.display='';
  populateFilters();
  renderToday();
  applyFilters();
}

function renderToday(){
  const now=new Date();
  const todays=allData.filter(r=>{
    const d=parseDate(r.data||'');
    return d&&d.getDate()===now.getDate()&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  }).sort((a,b)=>timeToMin(a.ora||'')-timeToMin(b.ora||''));
  const monthCount=allData.filter(r=>{const d=parseDate(r.data||'');return d&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;
  document.getElementById('h-today').textContent=todays.length;
  document.getElementById('h-month').textContent=monthCount;
  document.getElementById('h-total').textContent=allData.length;
  document.getElementById('today-badge').textContent=todays.length;
  document.getElementById('hero-sub').textContent=todays.length===0?'Nessun appuntamento programmato per oggi':todays.length===1?'1 appuntamento programmato':todays.length+' appuntamenti programmati';
  const el=document.getElementById('today-list');
  if(!todays.length){
    el.innerHTML=`<div class="empty-state" style="padding:32px 20px"><div class="icon">☀️</div><h3>Nessun appuntamento oggi</h3><p>Non ci sono appuntamenti programmati per oggi.</p></div>`;
    return;
  }
  el.innerHTML=todays.map((r,i)=>cardHTML(r,i,true)).join('');
}

function timeToMin(t){if(!t)return 9999;const p=t.split(':');return +p[0]*60+(+p[1]||0);}

function populateFilters(){
  const months=new Set(),services=new Set();
  allData.forEach(r=>{
    const d=parseDate(r.data||'');
    if(d)months.add(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
    if(r.servizio)services.add(r.servizio);
  });
  const ms=document.getElementById('filter-month');
  ms.innerHTML='<option value="">Tutti i mesi</option>';
  [...months].sort().reverse().forEach(m=>{const[y,mo]=m.split('-');ms.innerHTML+=`<option value="${m}">${MONTHS_IT[+mo-1]} ${y}</option>`;});
  const ss=document.getElementById('filter-service');
  ss.innerHTML='<option value="">Tutti i servizi</option>';
  [...services].sort().forEach(s=>ss.innerHTML+=`<option value="${s}">${s}</option>`);
}

function applyFilters(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const mo=document.getElementById('filter-month').value;
  const sv=document.getElementById('filter-service').value;
  filtered=allData.filter(r=>{
    if(q&&!Object.values(r).join(' ').toLowerCase().includes(q))return false;
    if(mo){const d=parseDate(r.data||'');if(!d)return false;if(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')!==mo)return false;}
    if(sv&&(r.servizio||'')!==sv)return false;
    return true;
  }).sort((a,b)=>{const da=parseDate(a.data||''),db=parseDate(b.data||'');if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return db-da;});
  document.getElementById('record-count').textContent=filtered.length+' appuntament'+(filtered.length===1?'o':'i');
  if(currentView==='list')renderList(); else renderCalendar();
}

function parseDate(s){
  if(!s)return null; s=s.trim(); let m;
  if(m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/))return new Date(+m[3],+m[2]-1,+m[1]);
  if(m=s.match(/^(\d{4})-(\d{2})-(\d{2})/))return new Date(+m[1],+m[2]-1,+m[3]);
  if(m=s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/))return new Date(+m[3],+m[2]-1,+m[1]);
  return null;
}

function setView(v){
  currentView=v;
  document.getElementById('vb-list').classList.toggle('active',v==='list');
  document.getElementById('vb-cal').classList.toggle('active',v==='calendar');
  document.getElementById('list-view').style.display=v==='list'?'':'none';
  document.getElementById('calendar-view').style.display=v==='calendar'?'':'none';
  if(v==='calendar')renderCalendar(); else renderList();
}

function renderList(){
  const el=document.getElementById('appointments-list');
  if(!filtered.length){el.innerHTML=emptyState('Nessun appuntamento trovato','Prova a modificare i filtri');return;}
  el.innerHTML=filtered.map((r,i)=>cardHTML(r,i,false)).join('');
}

function cardHTML(r,i,today){
  const col=ACCENTS[i%4],badge=BADGES[i%4];
  const az=r.azienda||'—',dt=r.data||'—',ora=r.ora||'—',sv=r.servizio||'—',vei=r.num_veicoli||'—',tip=r.tipo_veicoli||'—';
  const nome=[r.nome,r.cognome].filter(Boolean).join(' ')||'—';
  return`<div class="appointment-card${today?' today-card':''}" onclick='openModal(${JSON.stringify(r).replace(/'/g,"&#39;")})'>
    <div class="card-accent ${col}"></div>
    <div class="card-body">
      <div class="card-field"><label>Azienda</label><div class="val big">${esc(az)}</div><div class="sub">${esc(nome)}</div></div>
      <div class="card-field"><label>Data &amp; Ora</label><div class="val">${esc(dt)}</div><div class="sub">${esc(ora)}</div></div>
      <div class="card-field"><label>Servizio</label><div class="val">${esc(sv)}</div><div class="sub">${esc(vei)} ${esc(tip)}</div></div>
      <div class="card-field"><span class="card-badge ${badge}"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${esc(ora)}</span></div>
    </div></div>`;
}

function renderCalendar(){
  document.getElementById('cal-title').textContent=MONTHS_IT[calMonth]+' '+calYear;
  document.getElementById('cal-days-header').innerHTML=DAYS_SHORT.map(d=>`<div class="cal-day-header">${d}</div>`).join('');
  const map={};
  filtered.forEach(r=>{const d=parseDate(r.data||'');if(!d)return;const k=d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();if(!map[k])map[k]=[];map[k].push(r);});
  let sd=new Date(calYear,calMonth,1).getDay();sd=sd===0?6:sd-1;
  const dim=new Date(calYear,calMonth+1,0).getDate(),now=new Date();
  let cells='';
  for(let i=0;i<sd;i++)cells+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=dim;d++){
    const k=calYear+'-'+calMonth+'-'+d,appts=map[k]||[];
    const isT=now.getDate()===d&&now.getMonth()===calMonth&&now.getFullYear()===calYear;
    const dots=appts.slice(0,2).map(a=>`<span class="cal-dot">${esc(a.ora||'')} ${esc(a.azienda||'')}</span>`).join('');
    const more=appts.length>2?`<span class="cal-dot more">+${appts.length-2} altri</span>`:'';
    cells+=`<div class="cal-cell${isT?' today':''}" onclick="selectCalDay(${d})"><div class="cal-date">${d}</div>${dots}${more}</div>`;
  }
  document.getElementById('cal-body').innerHTML=cells;
}

function changeMonth(dir){
  calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();document.getElementById('cal-day-detail').style.display='none';
}

function selectCalDay(d){
  const ds=`${String(d).padStart(2,'0')}/${String(calMonth+1).padStart(2,'0')}/${calYear}`;
  const map={};
  filtered.forEach(r=>{const date=parseDate(r.data||'');if(!date)return;const k=`${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}`;if(!map[k])map[k]=[];map[k].push(r);});
  const appts=map[ds]||[];const det=document.getElementById('cal-day-detail');
  if(!appts.length){det.style.display='none';return;}
  document.getElementById('cal-day-title').textContent=`📅 ${d} ${MONTHS_IT[calMonth]} ${calYear} — ${appts.length} appuntament${appts.length===1?'o':'i'}`;
  document.getElementById('cal-day-list').innerHTML=appts.map((r,i)=>cardHTML(r,i,false)).join('');
  det.style.display='';det.scrollIntoView({behavior:'smooth',block:'start'});
}

function openModal(r){
  document.getElementById('modal-title').textContent=r.azienda||'—';
  document.getElementById('modal-sub').textContent=`${r.data||'—'} alle ${r.ora||'—'}`;
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-section"><h4>Dettagli Appuntamento</h4>
      <div class="modal-grid">
        <div class="modal-field"><label>Data</label><div class="val highlight">${esc(r.data||'—')}</div></div>
        <div class="modal-field"><label>Ora</label><div class="val highlight">${esc(r.ora||'—')}</div></div>
        <div class="modal-field"><label>Servizio</label><div class="val">${esc(r.servizio||'—')}</div></div>
        <div class="modal-field"><label>N° Veicoli</label><div class="val">${esc(r.num_veicoli||'—')}</div></div>
        <div class="modal-field" style="grid-column:span 2"><label>Tipo Veicoli</label><div class="val">${esc(r.tipo_veicoli||'—')}</div></div>
      </div></div>
    <div class="modal-section"><h4>Dati Cliente</h4>
      <div class="modal-grid">
        <div class="modal-field"><label>Azienda</label><div class="val">${esc(r.azienda||'—')}</div></div>
        <div class="modal-field"><label>Referente</label><div class="val">${esc([r.nome,r.cognome].filter(Boolean).join(' ')||'—')}</div></div>
        <div class="modal-field"><label>Telefono</label><div class="val">${esc(r.telefono||'—')}</div></div>
        <div class="modal-field"><label>Email</label><div class="val">${esc(r.email||'—')}</div></div>
        <div class="modal-field" style="grid-column:span 2"><label>Indirizzo</label><div class="val">${esc(r.indirizzo||'—')}</div></div>
      </div></div>
    ${(r.note||'').trim()?`<div class="modal-section"><h4>Note</h4><div class="modal-note">${esc(r.note)}</div></div>`:''}
    <div class="modal-section"><h4>Metadati</h4>
      <div class="modal-field"><label>Registrato il</label><div class="val">${esc(r.timestamp||'—')}</div></div>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal-overlay').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect();});

function exportCSV(){
  if(!filtered.length){showToast('Nessun dato da esportare','error');return;}
  const keys=Object.keys(filtered[0]);
  const csv=[keys.join(','),...filtered.map(r=>keys.map(k=>'"'+(r[k]||'').replace(/"/g,'""')+'"').join(','))].join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download='appuntamenti_italbatterie.csv';a.click();
  showToast('Export completato ✓','success');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function emptyState(t,s){return`<div class="empty-state"><div class="icon">📋</div><h3>${t}</h3><p>${s}</p></div>`;}
function setLoading(v){document.getElementById('loading').style.display=v?'flex':'none';document.getElementById('refresh-btn').classList.toggle('spinning',v);}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type?' '+type:'');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);}

setView('list');
</script>
</body>
</html>
