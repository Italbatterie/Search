<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Italbatterie – Appuntamenti</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --teal:#00475d;
  --teal-light:#005f7a;
  --teal-dark:#003040;
  --accent:#f0a500;
  --accent2:#00b8d9;
  --bg:#eef4f6;
  --surface:#fff;
  --surface2:#f4f9fb;
  --text:#1a2e38;
  --muted:#7a9aaa;
  --border:#d0e4eb;
  --red:#e05050;
  --green:#2eb87b;
  --orange:#f0a500;
  --radius:14px;
  --shadow:0 4px 24px rgba(0,71,93,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
header{background:var(--teal);padding:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.2)}
.header-inner{max-width:1400px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo-wrap{display:flex;flex-direction:column;line-height:1}
.logo-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;letter-spacing:4px;text-transform:uppercase}
.logo-sub{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:3px;text-transform:uppercase;margin-top:3px}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
.btn-white{background:#fff;color:var(--teal)}
.btn-white:hover{background:#e8f4f8}
.btn-outline{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.3)}
.btn-outline:hover{background:rgba(255,255,255,.1)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:#d4920a}
#refresh-btn svg{transition:transform .4s}
#refresh-btn.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── CONTENT ── */
.container{max-width:1400px;margin:0 auto;padding:28px 24px}

/* ── CONFIG BANNER ── */
.config-banner{background:linear-gradient(135deg,var(--teal),var(--teal-light));border-radius:var(--radius);padding:24px 28px;margin-bottom:28px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.config-banner .icon{font-size:32px;flex-shrink:0}
.config-banner h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;margin-bottom:4px}
.config-banner p{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:12px}
.url-input-row{display:flex;gap:8px;flex-wrap:wrap}
#sheet-url{flex:1;min-width:240px;padding:10px 14px;border-radius:8px;border:none;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;background:rgba(255,255,255,.15);color:#fff}
#sheet-url::placeholder{color:rgba(255,255,255,.4)}
#sheet-url:focus{background:rgba(255,255,255,.25)}
.config-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}
.stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.stat-icon.teal{background:rgba(0,71,93,.1)}
.stat-icon.green{background:rgba(46,184,123,.12)}
.stat-icon.orange{background:rgba(240,165,0,.12)}
.stat-icon.blue{background:rgba(0,184,217,.12)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--text);line-height:1}

/* ── TOOLBAR ── */
.toolbar{background:var(--surface);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
#search-input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;background:var(--surface2)}
#search-input:focus{border-color:var(--teal)}
.filter-group{display:flex;gap:8px;flex-wrap:wrap}
select.filter-select{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--surface2);color:var(--text);cursor:pointer;outline:none;transition:border-color .2s}
select.filter-select:focus{border-color:var(--teal)}
.view-toggle{display:flex;background:var(--surface2);border-radius:8px;padding:3px;border:1.5px solid var(--border)}
.view-btn{padding:6px 12px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:5px;transition:all .2s;font-family:'DM Sans',sans-serif}
.view-btn.active{background:var(--teal);color:#fff}
.record-count{font-size:12px;color:var(--muted);white-space:nowrap}

/* ── CALENDAR VIEW ── */
.calendar-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:24px}
.cal-header{background:var(--teal);padding:18px 24px;display:flex;align-items:center;gap:12px}
.cal-header h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;flex:1;text-align:center;text-transform:capitalize}
.cal-nav{background:transparent;border:1.5px solid rgba(255,255,255,.3);color:#fff;width:34px;height:34px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .2s;flex-shrink:0}
.cal-nav:hover{background:rgba(255,255,255,.15)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day-header{padding:10px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;border-bottom:1.5px solid var(--border)}
.cal-cell{min-height:80px;padding:6px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:var(--surface2)}
.cal-cell.empty{background:var(--surface2);cursor:default}
.cal-cell.today{background:rgba(0,71,93,.04)}
.cal-cell.today .cal-date{background:var(--teal);color:#fff;border-radius:50%}
.cal-cell.selected{background:rgba(0,71,93,.06);outline:2px solid var(--teal);outline-offset:-2px}
.cal-date{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin-bottom:4px;border-radius:50%}
.cal-dot{font-size:10px;padding:2px 5px;border-radius:4px;background:var(--teal);color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;display:block;max-width:100%}
.cal-dot.more{background:var(--accent);color:#fff}

/* ── LIST VIEW ── */
.list-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.appointment-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;transition:transform .2s,box-shadow .2s;cursor:pointer}
.appointment-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,71,93,.15)}
.card-accent{width:5px;flex-shrink:0}
.card-accent.green{background:var(--green)}
.card-accent.orange{background:var(--orange)}
.card-accent.blue{background:var(--accent2)}
.card-accent.teal{background:var(--teal)}
.card-body{flex:1;padding:18px 20px;display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:center}
.card-field label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:3px}
.card-field .val{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.card-field .val.big{font-size:15px;color:var(--teal);font-weight:700}
.card-field .sub{font-size:11px;color:var(--muted);margin-top:1px}
.card-badge{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.badge-green{background:rgba(46,184,123,.12);color:#1a8a5a}
.badge-orange{background:rgba(240,165,0,.12);color:#a06600}
.badge-teal{background:rgba(0,71,93,.1);color:var(--teal)}
.badge-blue{background:rgba(0,184,217,.12);color:#0077a0}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:18px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.3);transform:translateY(20px);transition:transform .25s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{background:var(--teal);padding:22px 28px;display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;margin-bottom:3px}
.modal-sub{font-size:12px;color:rgba(255,255,255,.6)}
.modal-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.modal-close:hover{background:rgba(255,255,255,.3)}
.modal-body{padding:24px 28px}
.modal-section{margin-bottom:20px}
.modal-section h4{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;padding-bottom:6px;border-bottom:1.5px solid var(--border)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-field label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:3px}
.modal-field .val{font-size:14px;color:var(--text);line-height:1.4}
.modal-field .val.highlight{font-weight:700;color:var(--teal);font-size:16px}
.modal-note{background:var(--surface2);border-radius:10px;padding:14px;font-size:13px;color:var(--text);line-height:1.6;border-left:3px solid var(--teal)}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .icon{font-size:48px;margin-bottom:16px}
.empty-state h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty-state p{font-size:14px}

/* ── LOADING ── */
.loading-overlay{position:fixed;inset:0;background:rgba(238,244,246,.9);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:44px;height:44px;border:4px solid rgba(0,71,93,.15);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
.loading-text{font-family:'Syne',sans-serif;font-size:14px;color:var(--teal);font-weight:600;letter-spacing:1px}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--teal);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:400;transform:translateY(60px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:8px}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:var(--red)}
.toast.success{background:var(--green)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .card-body{grid-template-columns:1fr 1fr;gap:10px}
  .card-field:last-child{grid-column:span 2}
}
@media(max-width:640px){
  .container{padding:16px}
  .card-body{grid-template-columns:1fr;gap:8px}
  .card-field:last-child{grid-column:1}
  .modal-grid{grid-template-columns:1fr}
  .config-banner{flex-direction:column;align-items:flex-start}
  .header-inner{padding:12px 16px}
  .logo-title{font-size:18px;letter-spacing:2px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .cal-grid{overflow-x:auto}
  .toolbar{flex-direction:column;align-items:stretch}
  .filter-group{flex-direction:column}
  .view-toggle{width:fit-content}
}
@media(max-width:400px){
  .stats-grid{grid-template-columns:1fr}
  .cal-dot{display:none}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-wrap">
      <span class="logo-title">Italbatterie</span>
      <span class="logo-sub">La tua strada, la nostra energia</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" id="refresh-btn" onclick="loadData()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Aggiorna
      </button>
      <button class="btn btn-white" onclick="exportCSV()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Esporta
      </button>
    </div>
  </div>
</header>

<div class="container">

  <!-- CONFIG -->
  <div class="config-banner" id="config-banner">
    <div class="icon">🔗</div>
    <div style="flex:1">
      <h2>Configura il tuo Google Sheet</h2>
      <p>Incolla il link pubblico del foglio (File → Condividi → Pubblica sul web → CSV)</p>
      <div class="url-input-row">
        <input id="sheet-url" type="url" placeholder="https://docs.google.com/spreadsheets/d/.../export?format=csv&gid=0"/>
        <div class="config-actions">
          <button class="btn btn-accent" onclick="saveUrl()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            Connetti
          </button>
          <button class="btn btn-outline" onclick="loadDemo()">Demo</button>
        </div>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-grid" id="stats-section" style="display:none">
    <div class="stat-card">
      <div class="stat-icon teal">📅</div>
      <div><div class="stat-label">Totale</div><div class="stat-value" id="stat-total">0</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">✅</div>
      <div><div class="stat-label">Questo mese</div><div class="stat-value" id="stat-month">0</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange">⏰</div>
      <div><div class="stat-label">Questa settimana</div><div class="stat-value" id="stat-week">0</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon blue">🚗</div>
      <div><div class="stat-label">Veicoli totali</div><div class="stat-value" id="stat-vehicles">0</div></div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar" id="toolbar" style="display:none">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" type="text" placeholder="Cerca azienda, servizio, nome…" oninput="applyFilters()"/>
    </div>
    <div class="filter-group">
      <select class="filter-select" id="filter-month" onchange="applyFilters()">
        <option value="">Tutti i mesi</option>
      </select>
      <select class="filter-select" id="filter-service" onchange="applyFilters()">
        <option value="">Tutti i servizi</option>
      </select>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="vb-list" onclick="setView('list')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Lista
      </button>
      <button class="view-btn" id="vb-cal" onclick="setView('calendar')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Calendario
      </button>
    </div>
    <span class="record-count" id="record-count"></span>
  </div>

  <!-- CALENDAR -->
  <div id="calendar-view" style="display:none">
    <div class="calendar-wrap">
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
        <h3 id="cal-title"></h3>
        <button class="cal-nav" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-days-header"></div>
      <div class="cal-grid" id="cal-body"></div>
    </div>
    <div id="cal-day-detail" style="display:none;margin-bottom:24px">
      <div style="padding:12px 0 8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:1px" id="cal-day-title"></div>
      <div id="cal-day-list" class="list-wrap"></div>
    </div>
  </div>

  <!-- LIST -->
  <div id="list-view" style="display:none">
    <div class="list-wrap" id="appointments-list"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">Appuntamento</div>
        <div class="modal-sub" id="modal-sub"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loading" style="display:none">
  <div class="spinner"></div>
  <div class="loading-text">Caricamento appuntamenti…</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'ital_sheet_url';
const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DAYS_IT = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const BADGE_COLORS = ['badge-teal','badge-green','badge-orange','badge-blue'];
const ACCENT_COLORS = ['teal','green','orange','blue'];

let allData = [];
let filtered = [];
let currentView = 'list';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

// ── INIT ──
window.onload = () => {
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){ document.getElementById('sheet-url').value = saved; loadData(); }
};

// ── URL MANAGEMENT ──
function saveUrl(){
  const url = document.getElementById('sheet-url').value.trim();
  if(!url){ showToast('Inserisci un URL valido','error'); return; }
  localStorage.setItem(STORAGE_KEY, url);
  loadData();
}

// ── DEMO DATA ──
function loadDemo(){
  const demo = [

// ── LOAD DATA ──
async function loadData(){
  const url = localStorage.getItem(STORAGE_KEY) || document.getElementById('sheet-url').value.trim();
  if(!url){ showToast('Nessun URL configurato','error'); return; }

  setLoading(true);
  try{
    // Add CORS proxy if needed
    let fetchUrl = url;
    if(!url.includes('cors') && !url.includes('localhost')){
      fetchUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
    }
    const resp = await fetch(fetchUrl);
    if(!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    allData = parseCSV(text);
    processData();
    showToast('Dati aggiornati ✓','success');
  }catch(err){
    showToast('Errore nel caricamento: ' + err.message,'error');
    console.error(err);
  }finally{
    setLoading(false);
  }
}

// ── CSV PARSER ──
function parseCSV(text){
  const lines = text.trim().split('\n');
  if(lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase()
    .replace('n° veicoli','num_veicoli')
    .replace('tipo veicoli','tipo_veicoli')
    .replace('azienda','azienda')
    .replace('indirizzo','indirizzo')
    .replace('nome','nome').replace('cognome','cognome')
    .replace('telefono','telefono').replace('email','email')
    .replace('data','data').replace('ora','ora')
    .replace('servizio','servizio').replace('note','note')
    .replace('timestamp','timestamp')
    .replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'')
  );
  const rows = [];
  for(let i=1;i<lines.length;i++){
    const vals = parseCSVLine(lines[i]);
    if(vals.every(v=>!v.trim())) continue;
    const obj = {};
    headers.forEach((h,idx) => obj[h] = (vals[idx]||'').trim());
    rows.push(obj);
  }
  return rows;
}

function parseCSVLine(line){
  const result = []; let cur = ''; let inQ = false;
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(c==='"'){ inQ=!inQ; continue; }
    if(c===','&&!inQ){ result.push(cur); cur=''; continue; }
    cur+=c;
  }
  result.push(cur);
  return result;
}

// ── PROCESS ──
function processData(){
  document.getElementById('stats-section').style.display='';
  document.getElementById('toolbar').style.display='';
  document.getElementById('config-banner').style.display='none';

  populateFilters();
  updateStats();
  applyFilters();
}

function populateFilters(){
  const months = new Set();
  const services = new Set();
  allData.forEach(r => {
    const d = parseDate(r.data||r.Data||'');
    if(d) months.add(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
    if(r.servizio) services.add(r.servizio);
  });
  const mSel = document.getElementById('filter-month');
  mSel.innerHTML = '<option value="">Tutti i mesi</option>';
  [...months].sort().reverse().forEach(m => {
    const [y,mo] = m.split('-');
    mSel.innerHTML += `<option value="${m}">${MONTHS_IT[parseInt(mo)-1]} ${y}</option>`;
  });
  const sSel = document.getElementById('filter-service');
  sSel.innerHTML = '<option value="">Tutti i servizi</option>';
  [...services].sort().forEach(s => sSel.innerHTML += `<option value="${s}">${s}</option>`);
}

function updateStats(){
  const now = new Date();
  const thisMonth = now.getMonth(); const thisYear = now.getFullYear();
  const weekAgo = new Date(now); weekAgo.setDate(now.getDate()-7);
  let month=0, week=0, vehicles=0;
  allData.forEach(r => {
    const d = parseDate(r.data||r.Data||'');
    if(d){
      if(d.getMonth()===thisMonth && d.getFullYear()===thisYear) month++;
      if(d>=weekAgo && d<=now) week++;
    }
    const v = parseInt(r.num_veicoli||r['n_veicoli']||0);
    if(!isNaN(v)) vehicles+=v;
  });
  document.getElementById('stat-total').textContent = allData.length;
  document.getElementById('stat-month').textContent = month;
  document.getElementById('stat-week').textContent = week;
  document.getElementById('stat-vehicles').textContent = vehicles;
}

function applyFilters(){
  const q = document.getElementById('search-input').value.toLowerCase();
  const mo = document.getElementById('filter-month').value;
  const sv = document.getElementById('filter-service').value;
  filtered = allData.filter(r => {
    const txt = Object.values(r).join(' ').toLowerCase();
    if(q && !txt.includes(q)) return false;
    if(mo){
      const d = parseDate(r.data||r.Data||'');
      if(!d) return false;
      const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      if(key!==mo) return false;
    }
    if(sv && (r.servizio||'')!==sv) return false;
    return true;
  });
  // Sort by date desc
  filtered.sort((a,b)=>{
    const da = parseDate(a.data||a.Data||'');
    const db = parseDate(b.data||b.Data||'');
    if(!da&&!db) return 0; if(!da) return 1; if(!db) return -1;
    return db-da;
  });
  document.getElementById('record-count').textContent = filtered.length + ' appuntament' + (filtered.length===1?'o':'i');
  if(currentView==='list') renderList();
  else renderCalendar();
}

// ── DATE PARSER ──
function parseDate(s){
  if(!s) return null;
  s = s.trim();
  let m;
  if(m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/)) return new Date(+m[3],+m[2]-1,+m[1]);
  if(m = s.match(/^(\d{4})-(\d{2})-(\d{2})/)) return new Date(+m[1],+m[2]-1,+m[3]);
  if(m = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/)) return new Date(+m[3],+m[2]-1,+m[1]);
  return null;
}

// ── VIEW TOGGLE ──
function setView(v){
  currentView = v;
  document.getElementById('vb-list').classList.toggle('active', v==='list');
  document.getElementById('vb-cal').classList.toggle('active', v==='calendar');
  document.getElementById('list-view').style.display = v==='list' ? '' : 'none';
  document.getElementById('calendar-view').style.display = v==='calendar' ? '' : 'none';
  if(v==='calendar') renderCalendar();
  else renderList();
}

// ── LIST RENDER ──
function renderList(){
  const el = document.getElementById('appointments-list');
  document.getElementById('list-view').style.display='';
  if(!filtered.length){ el.innerHTML = emptyState('Nessun appuntamento trovato','Prova a modificare i filtri di ricerca'); return; }
  el.innerHTML = filtered.map((r,i) => cardHTML(r,i)).join('');
}

function cardHTML(r, i){
  const color = ACCENT_COLORS[i%4];
  const badge = BADGE_COLORS[i%4];
  const azienda = r.azienda || r.Azienda || '—';
  const data = r.data || r.Data || '—';
  const ora = r.ora || r.Ora || '—';
  const servizio = r.servizio || r.Servizio || '—';
  const veicoli = r.num_veicoli || '—';
  const tipo = r.tipo_veicoli || '—';
  const nome = [r.nome,r.cognome].filter(Boolean).join(' ') || '—';
  return `<div class="appointment-card" onclick='openModal(${JSON.stringify(r).replace(/'/g,"&#39;")})'>
    <div class="card-accent ${color}"></div>
    <div class="card-body">
      <div class="card-field">
        <label>Azienda</label>
        <div class="val big">${esc(azienda)}</div>
        <div class="sub">${esc(nome)}</div>
      </div>
      <div class="card-field">
        <label>Data &amp; Ora</label>
        <div class="val">${esc(data)}</div>
        <div class="sub">${esc(ora)}</div>
      </div>
      <div class="card-field">
        <label>Servizio</label>
        <div class="val">${esc(servizio)}</div>
        <div class="sub">${esc(veicoli)} ${esc(tipo)}</div>
      </div>
      <div class="card-field">
        <span class="card-badge ${badge}">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${esc(ora)}
        </span>
      </div>
    </div>
  </div>`;
}

// ── CALENDAR RENDER ──
function renderCalendar(){
  document.getElementById('calendar-view').style.display='';
  const title = MONTHS_IT[calMonth] + ' ' + calYear;
  document.getElementById('cal-title').textContent = title;

  // Headers
  const hEl = document.getElementById('cal-days-header');
  hEl.innerHTML = DAYS_IT.map(d=>`<div class="cal-day-header">${d}</div>`).join('');

  // Build map: dateStr -> appointments
  const map = {};
  filtered.forEach(r => {
    const d = parseDate(r.data||r.Data||'');
    if(!d) return;
    const k = d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
    if(!map[k]) map[k]=[];
    map[k].push(r);
  });

  const firstDay = new Date(calYear, calMonth, 1);
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow-1; // Mon=0
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const today = new Date();

  let cells = '';
  for(let i=0;i<startDow;i++) cells += '<div class="cal-cell empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const k = calYear+'-'+calMonth+'-'+d;
    const appts = map[k]||[];
    const isToday = today.getDate()===d && today.getMonth()===calMonth && today.getFullYear()===calYear;
    const dots = appts.slice(0,2).map(a=>`<span class="cal-dot">${esc(a.ora||a.Ora||'')} ${esc(a.azienda||a.Azienda||'')}</span>`).join('');
    const more = appts.length>2 ? `<span class="cal-dot more">+${appts.length-2} altri</span>` : '';
    cells += `<div class="cal-cell${isToday?' today':''}" onclick="selectCalDay(${d})">
      <div class="cal-date">${d}</div>
      ${dots}${more}
    </div>`;
  }
  document.getElementById('cal-body').innerHTML = cells;
}

function changeMonth(dir){
  calMonth += dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
  document.getElementById('cal-day-detail').style.display='none';
}

function selectCalDay(d){
  const dateStr = `${String(d).padStart(2,'0')}/${String(calMonth+1).padStart(2,'0')}/${calYear}`;
  const map = {};
  filtered.forEach(r => {
    const date = parseDate(r.data||r.Data||'');
    if(!date) return;
    const k = `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}`;
    if(!map[k]) map[k]=[];
    map[k].push(r);
  });
  const appts = map[dateStr]||[];
  const detail = document.getElementById('cal-day-detail');
  if(!appts.length){ detail.style.display='none'; return; }
  document.getElementById('cal-day-title').textContent = `📅 ${d} ${MONTHS_IT[calMonth]} ${calYear} — ${appts.length} appuntament${appts.length===1?'o':'i'}`;
  document.getElementById('cal-day-list').innerHTML = appts.map((r,i)=>cardHTML(r,i)).join('');
  detail.style.display='';
  detail.scrollIntoView({behavior:'smooth',block:'start'});
}

function closeModal(e){ if(e.target===document.getElementById('modal-overlay')) closeModalDirect(); }

// ── EXPORT ──
function exportCSV(){
  if(!filtered.length){ showToast('Nessun dato da esportare','error'); return; }
  const keys = Object.keys(filtered[0]);
  const csv = [keys.join(','), ...filtered.map(r=>keys.map(k=>'"'+(r[k]||'').replace(/"/g,'""')+'"').join(','))].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = 'appuntamenti_italbatterie.csv';
  a.click();
  showToast('Export completato ✓','success');
}

// ── HELPERS ──
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function emptyState(title,sub){ return `<div class="empty-state"><div class="icon">📋</div><h3>${title}</h3><p>${sub}</p></div>`; }
function setLoading(v){
  document.getElementById('loading').style.display = v?'flex':'none';
  const btn = document.getElementById('refresh-btn');
  btn.classList.toggle('spinning',v);
}
function showToast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 3000);
}

setView('list');
